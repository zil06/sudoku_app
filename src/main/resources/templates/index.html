<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数独問題集</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="page-index">

  <!-- ヘッダー -->
  <header class="site-header">
    <div class="header-inner">
      <h1 class="logo">数独問題集</h1>
      <nav class="header-nav">
        <span th:if="${session.loginUser}" class="welcome-msg">
          <span th:text="${session.loginUser.username}"></span> さん
        </span>
        <a th:if="${session.loginUser}" th:href="@{/mypage}" class="nav-link">マイページ</a>
        <a th:if="${session.loginUser}" th:href="@{/logout}" class="nav-link nav-link--logout">ログアウト</a>
        <a th:unless="${session.loginUser}" th:href="@{/login}" class="nav-link nav-link--login">ログイン</a>
      </nav>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main class="main-content">
    <div class="hero">
      <p class="hero-subtitle">難易度を選んで、今日の問題を印刷しましょう</p>
    </div>

    <section class="difficulty-section">
      <h2 class="section-title">難易度を選択</h2>
      <div class="difficulty-cards">

        <!-- 初級 -->
        <a th:href="@{/problems(difficulty='EASY')}" class="difficulty-card difficulty-card--easy">
          <div class="card-icon">☆</div>
          <div class="card-body">
            <h3 class="card-title">初　級</h3>
            <p class="card-desc">空きマス 〜39個</p>
            <p class="card-note">数独はじめての方にも</p>
          </div>
          <span class="card-arrow">→</span>
        </a>

        <!-- 中級 -->
        <a th:href="@{/problems(difficulty='MEDIUM')}" class="difficulty-card difficulty-card--medium">
          <div class="card-icon">★</div>
          <div class="card-body">
            <h3 class="card-title">中　級</h3>
            <p class="card-desc">空きマス 40〜45個</p>
            <p class="card-note">ちょうどいい歯ごたえ</p>
          </div>
          <span class="card-arrow">→</span>
        </a>

        <!-- 上級 -->
        <a th:href="@{/problems(difficulty='HARD')}" class="difficulty-card difficulty-card--hard">
          <div class="card-icon">★★</div>
          <div class="card-body">
            <h3 class="card-title">上　級</h3>
            <p class="card-desc">空きマス 46〜50個</p>
            <p class="card-note">本格派の方へ</p>
          </div>
          <span class="card-arrow">→</span>
        </a>

      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 数独問題集</p>
  </footer>

</body>
</html>
