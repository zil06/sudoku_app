<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>数独生成結果</title>
    <style>
        table { border-collapse: collapse; border: 3px solid black;
             margin: 20px auto; }
        td { border: 1px solid gray; width: 40px; height: 40px;
             text-align: center; font-size: 20px; }
        /* 3x3のブロックを見やすくするための太線 */
        td:nth-child(3n) { border-right: 3px solid black; }
        tr:nth-child(3n) td { border-bottom: 3px solid black; }
        td:last-child { border-right: 3px solid black; }
        tr:last-child td { border-bottom: 3px solid black; }
    </style>
</head>
<body>
    <h1 style="text-align: center;">🧩 生成された数独</h1>
    <table>
        <tr th:each="row : ${board}">
            <td th:each="cell : ${row}" th:text="${cell}"></td>
        </tr>
    </table>
    <div style="text-align: center;">
        <button onclick="location.reload()">新しい盤面を生成</button>
    </div>
</body>
</html>
