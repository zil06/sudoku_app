<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン | 数独問題集</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="page-login">

  <main class="login-wrapper">
    <div class="login-card">
      <h1 class="login-title">数独問題集</h1>
      <p class="login-subtitle">ログイン</p>

      <!-- エラーメッセージ -->
      <div class="alert alert--error" th:if="${error}" th:text="${error}"></div>

      <form th:action="@{/login}" method="post" class="login-form">
        <div class="form-group">
          <label for="username" class="form-label">ユーザー名</label>
          <input type="text" id="username" name="username"
                 class="form-input" placeholder="username" required>
        </div>
        <div class="form-group">
          <label for="password" class="form-label">パスワード</label>
          <input type="password" id="password" name="password"
                 class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn--primary btn--full">ログイン</button>
      </form>

      <p class="login-back">
        <a th:href="@{/}">← ログインせずに問題を解く</a>
      </p>
    </div>
  </main>

</body>
</html>
