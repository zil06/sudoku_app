<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイページ | 数独問題集</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="page-mypage">

  <header class="site-header">
    <div class="header-inner">
      <a th:href="@{/}" class="logo">数独問題集</a>
      <nav class="header-nav">
        <a th:href="@{/logout}" class="nav-link nav-link--logout">ログアウト</a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <div class="page-heading">
      <h2 class="page-title">マイページ</h2>
      <p class="page-user" th:text="${username} + ' さんの印刷履歴'">ユーザーさんの印刷履歴</p>
    </div>

    <!-- 履歴テーブル -->
    <div class="table-wrapper" th:if="${not #lists.isEmpty(history)}">
      <table class="history-table">
        <thead>
          <tr>
            <th>印刷日時</th>
            <th>問題No.</th>
            <th>難易度</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="h : ${history}">
            <td th:text="${#temporals.format(h.printedAt, 'yyyy/MM/dd HH:mm')}"></td>
            <td th:text="'No.' + ${h.problem.problemId}"></td>
            <td>
              <span class="badge"
                    th:classappend="${h.problem.difficulty == 'EASY'} ? 'badge--easy' :
                                   (${h.problem.difficulty == 'MEDIUM'} ? 'badge--medium' : 'badge--hard')"
                    th:text="${h.problem.difficulty == 'EASY'} ? '初級' :
                             (${h.problem.difficulty == 'MEDIUM'} ? '中級' : '上級')">
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- 履歴なし -->
    <div class="empty-state" th:if="${#lists.isEmpty(history)}">
      <p>まだ印刷履歴がありません。</p>
      <a th:href="@{/}" class="btn btn--primary">問題を解いてみる</a>
    </div>

    <div class="page-actions">
      <a th:href="@{/}" class="btn btn--ghost">← トップに戻る</a>
    </div>
  </main>

  <footer class="site-footer">
    <p>© 2026 数独問題集</p>
  </footer>

</body>
</html>
