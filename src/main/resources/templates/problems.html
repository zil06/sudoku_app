<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>問題表示 | 数独問題集</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="page-problems">

  <header class="site-header">
    <div class="header-inner">
      <a th:href="@{/}" class="logo">数独問題集</a>
    </div>
  </header>

  <main class="main-content">
    <!-- ページタイトル & アクション -->
    <div class="page-toolbar">
      <div class="toolbar-left">
        <a th:href="@{/}" class="btn btn--ｓ">← 難易度選択に戻る</a>
        <span class="badge"
              th:classappend="${difficulty == 'EASY'} ? 'badge--easy' : (${difficulty == 'MEDIUM'} ? 'badge--medium' : 'badge--hard')"
              th:text="${difficulty == 'EASY'} ? '初級' : (${difficulty == 'MEDIUM'} ? '中級' : '上級')">
        </span>
      </div>
      <div class="toolbar-right">
        <a th:href="@{/problems(difficulty=${difficulty})}" class="btn btn--secondary">別の問題を表示</a>
        <a th:href="@{/print}" class="btn btn--primary">🖨 印刷プレビュー</a>
      </div>
    </div>

    <!-- 2問を横並びで表示 -->
    <div class="problems-grid">
      <div class="problem-card" th:each="problem, stat : ${problems}">
        <div class="problem-header">
          <span class="problem-number" th:text="'問題 ' + ${stat.count}">問題 1</span>
          <span class="problem-id" th:text="'No.' + ${problem.problemId}">No.1</span>
        </div>

        <!-- 数独グリッド -->
        <table class="sudoku-grid">
          <tbody>
            <!--
              Thymeleafでは81文字のStringを直接9×9に分割するのが難しいらしい
              ＞JavaScriptで描画するか、ControllerでList<List<Integer>>に変換して渡す方法が推奨？
              →今回はJSのレンダリング例を実装
            -->
            <tr th:each="row : ${#numbers.sequence(0, 8)}">
              <td
              th:each="col : ${#numbers.sequence(0, 8)}"
                th:with="idx=${row * 9 + col},
                        val=${#strings.substring(problem.problemData, idx, idx + 1)}"
                th:class="${val == '0'} ? 'cell cell--empty' : 'cell cell--given'"
                th:classappend="${(col == 2 or col == 5) and (row == 2 or row == 5)} ? ' cell--border-right cell--border-bottom' :
                              (${col == 2 or col == 5} ? ' cell--border-right' :
                              (${row == 2 or row == 5} ? ' cell--border-bottom' : ''))"
                th:text="${val == '0'} ? '' : ${val}">
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <footer class="site-footer">
    <p>© 2026 数独問題集</p>
  </footer>

</body>
</html>
